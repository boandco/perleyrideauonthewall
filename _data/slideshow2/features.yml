slides:
  - layout: landscape
    title: Annual Donor Reception and Strawberry Social 🍓
    image: assets/images/uploads/perleyhealth_strawberrysocial_r3-6608.jpg
    description: >-
      We celebrated the generosity and continued support of our donors at the
      Annual Donor Reception and Strawberry Social. 


      Big thank you for helping us to improve the quality of life of the Veterans and seniors we serve.
  - layout: landscape
    image: assets/images/uploads/img_e5860.jpg
    title: "Welcome to the Century Club, Royal Canadian Legion! "
    description: We were thrilled to welcome the Royal Canadian Legion into the
      Perley Health Century Club this year in recognition of their 100th
      Anniversary.
  - layout: landscape
    image: assets/images/uploads/perleyhealth_strawberrysocial_r2-1637.jpg
    title: "Thank You Royal Canadian Legion Br 638 Kanata! "
    description: We are so grateful for the members of Branch 638 in Kanata for your
      lasting support of the Veterans at Perley Health.
  - layout: landscape
    image: assets/images/uploads/cnw_04-22-26_vac_113.jpg
    description: Thank you to Deborah’s Gift Boutique for their generous $35,000
      donation in support of our Bridging Generations Campaign, helping make our
      new Intergenerational Early Learning Centre possible.
    title: Thank you to Deborah’s Gift Boutique
  - layout: landscape
    title: Thank You Royal Canadian Legion Br 625 Richmond!
    description: Thank you for your generous donation, and ongoing commitment to the
      support, betterment and safety of the Veterans at Perley Health.
    image: assets/images/uploads/2026-rcl-richmond-cheque-presentation.jpg
  - layout: portrait
    image: assets/images/uploads/rcl.png
    title: "Thank You Royal Canadian Legion Br 462 Eastview! "
    description: >-
      Thank you for your generous donation, which was presented to Perley Health
      Foundation at the Branch’s annual Honours & Awards Ceremony. This gift is
      being directed to purchase three pieces of equipment that will provide
      dignity, independence, comfort, and care to Veterans at Perley Health. 


      Eastview Branch Member and Perley Health resident Roland Lalonde also generously donated a painting he made at Perley Health’s art studio to the Branch.
  - image: assets/images/uploads/rcl-br-212-kemptville.jpg
    layout: portrait
    description: Thank you Royal Canadian Legion Br 212 Kemptville for your generous
      donation of $10,000 in support of the Bridging Generations campaign! This
      gift will help build meaningful connections between children and Veterans
      through Canada’s first dementia-friendly intergenerational childcare
      program, creating a place where generations learn from and enrich each
      other every day.
    title: Thank you Royal Canadian Legion Br 212 Kemptville!
  - image: assets/images/uploads/group.jpg
    layout: landscape
    title: Thank you Royal Canadian Legion!
    description: >-
      Thank you the Royal Canadian Legion Branches for your continued support
      and dedication to Perley Health over the years! This past year they raised
      a total of $250,435 to purchase items from the Veterans' Priority Needs
      List to ensure all Veterans who call Perley Health home are able to live
      life to the fullest!


      Thank you for your commitment!
